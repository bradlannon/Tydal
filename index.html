<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tydal</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="importmap">
  {
    "imports": {
      "tone": "https://cdn.jsdelivr.net/npm/tone@15.1.22/+esm",
      "tonal": "https://cdn.jsdelivr.net/npm/tonal@6.4.2/+esm"
    }
  }
  </script>
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Tydal</h1>
  </header>

  <main class="app-main">
    <div id="instrument" class="instrument-container">
      <!-- Pad grid injected by app.js -->
      <div id="visualizer"></div>
    </div>
  </main>

  <!-- Bottom sheets (panels) -->
  <div class="sheet-backdrop" id="sheet-backdrop"></div>

  <div class="bottom-sheet" id="synth-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Synth</div>
    <div class="sheet-content" id="synth-panel"></div>
  </div>

  <div class="bottom-sheet" id="fx-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Effects</div>
    <div class="sheet-content" id="fx-panel"></div>
  </div>

  <div class="bottom-sheet" id="seq-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Sequencer</div>
    <div class="sheet-content" id="sequencer"></div>
  </div>

  <div class="bottom-sheet" id="macro-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Macro</div>
    <div class="sheet-content" id="macro-panel"></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button id="play-btn" class="toolbar-btn toolbar-btn--play" aria-label="Play/Stop">▶</button>

    <div class="octave-control">
      <button id="octave-down" class="octave-btn" aria-label="Octave down">-</button>
      <span id="octave-display" class="octave-display">Oct 3</span>
      <button id="octave-up" class="octave-btn" aria-label="Octave up">+</button>
    </div>

    <div class="toolbar-panels">
      <button class="toolbar-btn" data-sheet="synth-sheet" aria-label="Synth panel">Synth</button>
      <button class="toolbar-btn" data-sheet="fx-sheet" aria-label="Effects panel">FX</button>
      <button class="toolbar-btn" data-sheet="seq-sheet" aria-label="Drums panel">Drums</button>
      <button class="toolbar-btn" data-sheet="macro-sheet" aria-label="Macro panel">Macro</button>
    </div>

    <div id="note-repeat-control" class="note-repeat-control"></div>

    <div class="toolbar-controls">
      <div class="volume-control">
        <input
          type="range"
          id="volume-slider"
          min="-40"
          max="0"
          value="-6"
          step="1"
          aria-label="Master Volume"
        >
      </div>

      <div id="gyro-panel" class="gyro-control"></div>

      <div class="scale-control">
        <select id="scale-key" aria-label="Scale key">
          <option value="">Off</option>
          <option value="C">C</option>
          <option value="C#">C#</option>
          <option value="D">D</option>
          <option value="D#">D#</option>
          <option value="E">E</option>
          <option value="F">F</option>
          <option value="F#">F#</option>
          <option value="G">G</option>
          <option value="G#">G#</option>
          <option value="A">A</option>
          <option value="A#">A#</option>
          <option value="B">B</option>
        </select>
        <select id="scale-type" aria-label="Scale type">
          <option value="major">Major</option>
          <option value="minor">Minor</option>
          <option value="dorian">Dorian</option>
          <option value="mixolydian">Mixolydian</option>
          <option value="pentatonic">Pentatonic</option>
          <option value="blues">Blues</option>
        </select>
      </div>
    </div>

    <div class="help-wrapper">
      <button id="help-btn" class="help-btn" aria-label="Show keyboard shortcuts">?</button>
      <div id="help-panel" class="help-panel" hidden>
        <h2 class="help-panel-title">Keyboard Shortcuts</h2>
        <div class="help-grid">
          <div class="help-row">
            <span class="help-row-label">Top row</span>
            <span class="help-keys">1&nbsp;&nbsp;2&nbsp;&nbsp;3&nbsp;&nbsp;4</span>
            <span class="help-notes">A4 B4 C5 D5</span>
          </div>
          <div class="help-row">
            <span class="help-row-label">Third row</span>
            <span class="help-keys">Q&nbsp;&nbsp;W&nbsp;&nbsp;E&nbsp;&nbsp;R</span>
            <span class="help-notes">D4 E4 F4 G4</span>
          </div>
          <div class="help-row">
            <span class="help-row-label">Second row</span>
            <span class="help-keys">A&nbsp;&nbsp;S&nbsp;&nbsp;D&nbsp;&nbsp;F</span>
            <span class="help-notes">G3 A3 B3 C4</span>
          </div>
          <div class="help-row">
            <span class="help-row-label">Bottom row</span>
            <span class="help-keys">Z&nbsp;&nbsp;X&nbsp;&nbsp;C&nbsp;&nbsp;V</span>
            <span class="help-notes">C3 D3 E3 F3</span>
          </div>
        </div>
        <p class="help-tip">Hold key to sustain &mdash; release to stop</p>
      </div>
    </div>
  </div>

  <div id="audio-overlay" hidden>
    <div class="overlay-inner">
      <p class="overlay-text">Tap anywhere to enable audio</p>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
